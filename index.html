    <meta property="og:title" content="#srishmetsahil">

    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:description" content="Srish met Sahil">
    <meta name="twitter:image" content="https://invalidtoken.github.io/invitation/image-2.png">

    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="icon" type="image/png" href="image-2.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f7deda;

            background-image:
                linear-gradient(rgba(247,222,218,0.08), rgba(247,222,218,0.08)),
                url("background.png");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            padding: 12px;

            overflow: hidden;
            position: relative;
        }

        /* Soft vignette */
        body::before {
            content: "";
            position: absolute;
            inset: 0;

            background: radial-gradient(
                ellipse at center,
                rgba(255,255,255,0) 45%,
                rgba(233,190,183,0.08) 72%,
                rgba(199,145,139,0.16) 100%
            );

            pointer-events: none;
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 1200px;

            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
            z-index: 2;
        }

        .responsive-image {
            width: auto;
            height: auto;

            max-width: 100%;
            max-height: 90vh;

            object-fit: contain;

            border-radius: 8px;

            box-shadow:
                0 12px 30px rgba(85,55,50,.10),
                0 35px 80px rgba(85,55,50,.18);

            transition: transform .3s ease;
        }

        .responsive-image:hover {
            transform: translateY(-3px);
        }

        @media (max-width:768px) {

            body{
                padding:10px;
                background-attachment:scroll;
            }

            .responsive-image{
                max-height:82vh;
            }

        }
    </style>
</head>

<body>

    <div class="container">
        <img
            src="image-2.png"
            alt="Srish met Sahil"
            class="responsive-image">
    </div>

</body>
</html>
