<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>#srishmetsahil</title>
    <!-- Primary Meta Tags -->
    <meta name="title" content="#srishmetsahil" />
    <meta
      name="description"
      content="sahilmetsrish"
    />

    <!-- Open Graph / Facebook / WhatsApp / Telegram -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://username.github.io/invitation/" />
    <meta
      property="og:title"
      content="#srishmetsahil"
    />
    <meta
      property="og:description"
      content="sahilmetsrish"
    />
    <meta
      property="og:image"
      content="https://username.github.io/invitation/image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1600" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://username.github.io/invitation/" />
    <meta
      name="twitter:title"
      content="#srishmetsahil"
    />
    <meta
      name="twitter:description"
      content="sahilmetsrish"
    />
    <meta
      name="twitter:image"
      content="https://username.github.io/invitation/image.png"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#f7deda" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="image.png" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        /* Fallback color */
        background-color: #f7deda;

        /* Pink textured paper background */
        background-image:
          linear-gradient(rgba(247, 222, 218, 0.08), rgba(247, 222, 218, 0.08)),
          url("background.png");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;

        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;

        overflow: hidden;
        position: relative;
      }

      /* Soft vignette */
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          rgba(255, 255, 255, 0) 45%,
          rgba(233, 190, 183, 0.08) 72%,
          rgba(199, 145, 139, 0.16) 100%
        );
        pointer-events: none;
        z-index: 1;
      }

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        max-width: 1200px;
        z-index: 2;
      }

      .responsive-image {
        max-width: 100%;
        max-height: 90vh;
        width: auto;
        height: auto;
        object-fit: contain;
        border-radius: 6px;

        /* Premium floating shadow */
        box-shadow:
          0 10px 25px rgba(85, 55, 50, 0.1),
          0 30px 70px rgba(85, 55, 50, 0.18);

        transition: transform 0.3s ease;
      }

      .responsive-image:hover {
        transform: translateY(-2px);
      }

      @media (max-width: 768px) {
        body {
          padding: 10px;
          background-attachment: scroll;
        }

        .responsive-image {
          max-height: 82vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="image.png"
        alt="srishmetsahil"
        class="responsive-image"
      />
    </div>
  </body>
</html>
